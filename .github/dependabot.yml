version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    groups:
      frontend:
        patterns: ['*']
        update-types: ['minor', 'patch']
    open-pull-requests-limit: 5

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: monthly
    groups:
      rust:
        patterns: ['*']
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
