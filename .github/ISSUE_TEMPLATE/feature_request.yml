name: 功能建议
description: 提议新功能或体验改进
title: '[Feature] '
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题
      description: 请描述当前场景和遇到的不便。
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望的方案
      description: 请描述你希望 Xiangzi MD 如何处理。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 其他方案或补充信息
