name: Sync to Gitee

on:
  push:
    branches:
      - main
      - electron-legacy-v0.1
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: sync-gitee
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Gitee SSH key
        env:
          GITEE_PRIVATE_KEY: ${{ secrets.GITEE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          test -n "${GITEE_PRIVATE_KEY}"
          install -d -m 700 ~/.ssh
          printf '%s\n' "${GITEE_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H gitee.com >> ~/.ssh/known_hosts

      - name: Mirror main, Electron legacy branch and tags
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes
        run: |
          set -euo pipefail
          git remote add gitee git@gitee.com:tlqgyx/xiangzi-md.git
          git fetch origin \
            +refs/heads/main:refs/remotes/origin/main \
            +refs/heads/electron-legacy-v0.1:refs/remotes/origin/electron-legacy-v0.1 \
            +refs/tags/*:refs/tags/*
          git push --force gitee refs/remotes/origin/main:refs/heads/main
          git push --force gitee refs/remotes/origin/electron-legacy-v0.1:refs/heads/electron-legacy-v0.1
          git push --force gitee --tags
