name: Publish Gitee Release

on:
  workflow_run:
    workflows:
      - Release Desktop
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to publish
        required: true
        default: v1.0.0
permissions:
  contents: read

concurrency:
  group: publish-gitee-release
  cancel-in-progress: true

jobs:
  publish:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || 'main' }}

      - name: Resolve release tag
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "workflow_run" ]; then
            TAG="v$(jq -r '.version' package.json)"
          elif [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${INPUT_TAG}"
          else
            TAG="v$(jq -r '.version' package.json)"
          fi
          [[ "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Download GitHub Release installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          install -d artifacts
          RELEASE=$(curl --fail --silent --show-error \
            --retry 4 --retry-delay 5 --retry-all-errors \
            --connect-timeout 20 --max-time 120 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}")
          printf '%s' "${RELEASE}" > /tmp/github-release.json
          mapfile -t ASSETS < <(echo "${RELEASE}" | jq -r \
            '.assets[] | select(.name == "latest.json" or (.name | test("\\.(dmg|exe|sig|tar\\.gz)$"))) | [.browser_download_url, .name] | @tsv')
          test "${#ASSETS[@]}" -ge 5
          for ASSET in "${ASSETS[@]}"; do
            IFS=$'\t' read -r URL NAME <<< "${ASSET}"
            FILE="artifacts/${NAME}"
            curl --fail --location --silent --show-error \
              --retry 4 --retry-delay 5 --retry-all-errors \
              --connect-timeout 20 --max-time 300 \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -o "${FILE}" "${URL}"
          done
          test "$(find artifacts -maxdepth 1 -name '*.dmg' | wc -l | tr -d ' ')" -eq 1
          test "$(find artifacts -maxdepth 1 -name '*-setup.exe' | wc -l | tr -d ' ')" -eq 1
          test -f artifacts/latest.json
          test "$(find artifacts -maxdepth 1 -name '*.sig' | wc -l | tr -d ' ')" -ge 2

      - name: Upsert Gitee Release installers
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_PRIVATE_KEY: ${{ secrets.GITEE_PRIVATE_KEY }}
          GITEE_KNOWN_HOSTS: ${{ secrets.GITEE_KNOWN_HOSTS }}
          TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "${GITEE_TOKEN}"
          OWNER="tlqgyx"
          REPO="xiangzi-md"
          API="https://gitee.com/api/v5/repos/${OWNER}/${REPO}"
          gitee_curl() {
            curl -H "Authorization: Bearer ${GITEE_TOKEN}" "$@"
          }

          install -d -m 700 ~/.ssh
          printf '%s\n' "${GITEE_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # 与代码镜像工作流保持一致：secret 可覆盖主机公钥；未配置时使用
          # 仓库内置、经 ssh-keyscan 核验的 Gitee 公钥，避免发布任务直接退出。
          if [ -n "${GITEE_KNOWN_HOSTS}" ]; then
            printf '%s\n' "${GITEE_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          else
            printf '%s\n' \
              'gitee.com ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBMuEoYdx6to5oxR60IWj8uoe1aI0X1fKOHWOtLqTg1tsLT1iFwXV5JmFjU46EzeMBV/6EmI1uaRI6HiEPtPtJHE=' \
              'gitee.com ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEKxHSJ7084RmkJ4YdEi5tngynE8aZe2uEoVVsB/OvYN' \
              'gitee.com ssh-rsa ' \
              > ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts
          ssh-keygen -F gitee.com -f ~/.ssh/known_hosts >/dev/null
          git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}"
          git remote add gitee git@gitee.com:${OWNER}/${REPO}.git
          GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes" \
            git push gitee "refs/tags/${TAG}:refs/tags/${TAG}"

          echo "Waiting for Gitee tag ${TAG}..."
          FOUND=""
          for i in $(seq 1 24); do
            FOUND=$(gitee_curl --fail --silent --show-error \
              --retry 3 --retry-delay 5 --retry-all-errors \
              --connect-timeout 20 --max-time 60 \
              "${API}/tags?limit=100" \
              | jq -r --arg tag "${TAG}" '.[] | select(.name == $tag) | .name')
            [ "${FOUND}" = "${TAG}" ] && break
            sleep 10
          done
          test "${FOUND}" = "${TAG}"

          RELEASE=$(gitee_curl --silent --show-error \
            --retry 3 --retry-delay 5 --retry-all-errors \
            --connect-timeout 20 --max-time 60 \
            "${API}/releases/tags/${TAG}")
          RELEASE_ID=$(echo "${RELEASE}" | jq -r '.id // empty')
          if [ -z "${RELEASE_ID}" ]; then
            PAYLOAD=$(jq -n \
              --arg tag "${TAG}" \
              '{tag_name:$tag,name:$tag,target_commitish:"main",body:"macOS Universal DMG 与 Windows x64 安装包见附件。"}')
            RELEASE=$(gitee_curl --fail --silent --show-error -X POST \
              --retry 3 --retry-delay 5 --retry-all-errors \
              --connect-timeout 20 --max-time 60 \
              "${API}/releases" -H "Content-Type: application/json" -d "${PAYLOAD}")
            RELEASE_ID=$(echo "${RELEASE}" | jq -r '.id')
          fi
          test -n "${RELEASE_ID}"

          ATTACHMENTS=$(gitee_curl --fail --silent --show-error \
            --retry 3 --retry-delay 5 --retry-all-errors \
            --connect-timeout 20 --max-time 60 \
            "${API}/releases/${RELEASE_ID}/attach_files?per_page=100")
          declare -A KEPT=()
          while IFS=$'\t' read -r ATTACHMENT_ID NAME; do
            case "${NAME}" in
              *.dmg|*.exe|*.sig|*.tar.gz|latest.json)
                if [ -f "artifacts/${NAME}" ] && [ -z "${KEPT[${NAME}]+x}" ]; then
                  KEPT["${NAME}"]=1
                  continue
                fi
                echo "Deleting stale installer: ${NAME}"
                gitee_curl --fail --silent --show-error -X DELETE \
                  --retry 3 --retry-delay 5 --retry-all-errors \
                  --connect-timeout 20 --max-time 60 \
                  "${API}/releases/${RELEASE_ID}/attach_files/${ATTACHMENT_ID}"
                ;;
            esac
          done < <(echo "${ATTACHMENTS}" | jq -r '.[] | [.id, .name] | @tsv')

          for FILE in artifacts/*; do
            NAME=$(basename "${FILE}")
            ATTACHMENTS=$(gitee_curl --fail --silent --show-error \
              --retry 3 --retry-delay 5 --retry-all-errors \
              --connect-timeout 20 --max-time 60 \
              "${API}/releases/${RELEASE_ID}/attach_files?per_page=100&_=$(date +%s)")
            if echo "${ATTACHMENTS}" | jq -e --arg name "${NAME}" \
              '.[] | select(.name == $name)' >/dev/null; then
              echo "Already uploaded: ${NAME}"
              continue
            fi

            echo "Uploading ${NAME}"
            UPLOADED=""
            for ATTEMPT in 1 2; do
              RESPONSE_FILE=$(mktemp)
              gitee_curl --fail --silent --show-error -X POST \
                --connect-timeout 20 --max-time 900 \
                "${API}/releases/${RELEASE_ID}/attach_files" \
                -F "file=@${FILE}" >"${RESPONSE_FILE}" &
              UPLOAD_PID=$!
              echo "Watching Gitee while ${NAME} uploads (attempt ${ATTEMPT})"
              for POLL in $(seq 1 90); do
                RUNNING=1
                if ! kill -0 "${UPLOAD_PID}" 2>/dev/null; then
                  set +e
                  wait "${UPLOAD_PID}"
                  CURL_STATUS=$?
                  set -e
                  RUNNING=""
                  if [ "${CURL_STATUS}" -eq 0 ] && \
                    [ "$(jq -r '.name // empty' "${RESPONSE_FILE}")" = "${NAME}" ]; then
                    UPLOADED=1
                    break
                  fi
                fi

                ATTACHMENTS=$(gitee_curl --fail --silent --show-error \
                  --retry 3 --retry-delay 5 --retry-all-errors \
                  --connect-timeout 20 --max-time 60 \
                  "${API}/releases/${RELEASE_ID}/attach_files?per_page=100&_=$(date +%s)")
                if echo "${ATTACHMENTS}" | jq -e --arg name "${NAME}" \
                  '.[] | select(.name == $name)' >/dev/null; then
                  UPLOADED=1
                  break
                fi
                [ -n "${RUNNING}" ] || break
                sleep 10
              done
              kill "${UPLOAD_PID}" 2>/dev/null || true
              wait "${UPLOAD_PID}" 2>/dev/null || true
              rm -f "${RESPONSE_FILE}"
              [ -z "${UPLOADED}" ] || break
            done
            test -n "${UPLOADED}"
          done

          ATTACHMENTS=$(gitee_curl --fail --silent --show-error \
            --retry 3 --retry-delay 5 --retry-all-errors \
            --connect-timeout 20 --max-time 60 \
            "${API}/releases/${RELEASE_ID}/attach_files?per_page=100&_=$(date +%s)")
          echo "${ATTACHMENTS}" | jq -e '.[] | select(.name | endswith(".dmg"))' >/dev/null
          echo "${ATTACHMENTS}" | jq -e '.[] | select(.name | endswith("-setup.exe"))' >/dev/null
          echo "${ATTACHMENTS}" | jq -e '.[] | select(.name | endswith(".tar.gz"))' >/dev/null
          echo "${ATTACHMENTS}" | jq -e '.[] | select(.name | endswith(".sig"))' >/dev/null

          echo "Building the stable Gitee updater manifest"
          echo "${ATTACHMENTS}" > /tmp/gitee-attachments.json
          jq --slurpfile attachments /tmp/gitee-attachments.json \
             --slurpfile github /tmp/github-release.json '
            .platforms |= with_entries(
              .value.url as $github_url |
              ($github[0].assets[] | select(.browser_download_url == $github_url) | .name) as $asset_name |
              ($attachments[0][] | select(.name == $asset_name) |
                (.browser_download_url // .download_url // empty)) as $gitee_url |
              if ($gitee_url | length) == 0
              then error("Missing Gitee updater asset: " + $asset_name)
              else .value.url = $gitee_url
              end
            )
          ' artifacts/latest.json > /tmp/latest.gitee.json
          jq -e '.platforms | length >= 2' /tmp/latest.gitee.json >/dev/null

          rm -rf /tmp/xiangzi-updater-manifest
          GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes" \
            git clone --depth 1 --branch updater git@gitee.com:tlqgyx/xiangzi-md.git /tmp/xiangzi-updater-manifest
          cd /tmp/xiangzi-updater-manifest
          cp /tmp/latest.gitee.json latest.json
          git config user.name guoxiangzi
          git config user.email tlqgyx@163.com
          git add latest.json
          git diff --cached --quiet || git commit -m "chore: publish ${TAG} updater manifest"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes" \
            git push origin HEAD:refs/heads/updater
