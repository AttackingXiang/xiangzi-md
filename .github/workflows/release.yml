name: Release Desktop

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact: macos-universal
            args: --target universal-apple-darwin --bundles dmg
          - platform: windows-latest
            artifact: windows-x64
            args: --bundles nsis
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust for macOS universal build
        if: runner.os == 'macOS'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Rust
        if: runner.os != 'macOS'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend quality gate
        run: npm run check

      - name: Build and publish GitHub Release assets
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: '-'
        with:
          tagName: v__VERSION__
          releaseName: Xiangzi MD v__VERSION__
          releaseBody: |
            Xiangzi MD 1.0 Tauri 版本。

            - macOS：Universal DMG，同时支持 Apple Silicon 与 Intel。
            - Windows：x64 NSIS 安装包。
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Upload macOS artifact for Gitee
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-universal
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 3

      - name: Upload Windows artifact for Gitee
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x64
          path: src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error
          retention-days: 3

  publish-gitee:
    name: Publish Gitee Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: artifacts
          merge-multiple: true

      - name: Create Gitee Release and upload assets
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          set -euo pipefail
          test -n "${GITEE_TOKEN}"

          TAG="${{ github.ref_name }}"
          OWNER="tlqgyx"
          REPO="xiangzi-md"

          echo "Waiting for Gitee to receive ${TAG}..."
          FOUND=""
          for i in $(seq 1 24); do
            FOUND=$(curl --fail --silent --show-error \
              "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/tags?access_token=${GITEE_TOKEN}&limit=100" \
              | jq -r --arg tag "${TAG}" '.[] | select(.name == $tag) | .name')
            if [ "${FOUND}" = "${TAG}" ]; then
              break
            fi
            sleep 10
          done
          test "${FOUND}" = "${TAG}"

          PAYLOAD=$(jq -n \
            --arg token "${GITEE_TOKEN}" \
            --arg tag "${TAG}" \
            '{access_token:$token,tag_name:$tag,name:$tag,target_commitish:"main",body:"macOS Universal DMG 与 Windows x64 安装包见附件。"}')
          RESPONSE=$(curl --silent --show-error -X POST \
            "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}")
          RELEASE_ID=$(echo "${RESPONSE}" | jq -r '.id // empty')

          if [ -z "${RELEASE_ID}" ]; then
            RELEASE_ID=$(curl --fail --silent --show-error \
              "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases/tags/${TAG}?access_token=${GITEE_TOKEN}" \
              | jq -r '.id')
          fi

          for FILE in artifacts/*.dmg artifacts/*-setup.exe; do
            [ -f "${FILE}" ] || continue
            echo "Uploading $(basename "${FILE}")"
            curl --fail --silent --show-error -X POST \
              "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases/${RELEASE_ID}/attach_files" \
              -F "access_token=${GITEE_TOKEN}" \
              -F "file=@${FILE}"
          done
