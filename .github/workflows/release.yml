name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── 各平台构建 & 发布到 GitHub Releases ──────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: macos
          - os: windows-latest
            artifact: windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish to GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist -- --publish always

      # 暂存产物供后续 Gitee 上传
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.yml
            release/*.blockmap
          retention-days: 1

  # ── 所有平台构建完成后，同步上传到 Gitee Releases ────────────────────────
  publish-gitee:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos
          path: artifacts/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows
          path: artifacts/windows

      - name: Create Gitee Release and upload assets
        continue-on-error: true          # Gitee 上传失败不影响主流程
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          OWNER="tlqgyx"
          REPO="xiangzi-md"

          # 等待 Gitee 镜像同步完成（最多 3 分钟）
          echo "Waiting for Gitee mirror to sync tag ${TAG}..."
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/git/refs/tags/${TAG}?access_token=${GITEE_TOKEN}")
            if [ "$STATUS" = "200" ]; then
              echo "Tag synced to Gitee."
              break
            fi
            echo "  Not yet (attempt $i/18)... waiting 10s"
            sleep 10
          done

          # 解析 JSON，出错时返回空字符串并打印原始响应
          parse_id() {
            python3 -c "
import sys, json
raw = sys.stdin.read()
try:
    d = json.loads(raw)
    print(d.get('id','') if isinstance(d, dict) else '')
except Exception as e:
    import sys as s; s.stderr.write('Parse error: ' + str(e) + '\nRaw: ' + raw[:500] + '\n')
    print('')
"
          }

          # 创建 Gitee Release
          RESP=$(curl -s -X POST "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases" \
            -H "Content-Type: application/json" \
            -d "{
              \"access_token\": \"${GITEE_TOKEN}\",
              \"tag_name\": \"${TAG}\",
              \"name\": \"${TAG}\",
              \"body\": \"详细更新日志请查看 [GitHub Releases](https://github.com/AttackingXiang/xiangzi-md/releases/tag/${TAG})\"
            }")
          echo "Create response: ${RESP:0:200}"
          RELEASE_ID=$(echo "$RESP" | parse_id)

          # Release 已存在时直接查询
          if [ -z "$RELEASE_ID" ]; then
            RESP2=$(curl -s "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases/tags/${TAG}?access_token=${GITEE_TOKEN}")
            echo "Query response: ${RESP2:0:200}"
            RELEASE_ID=$(echo "$RESP2" | parse_id)
          fi

          echo "Gitee Release ID: $RELEASE_ID"
          if [ -z "$RELEASE_ID" ]; then
            echo "::warning::Could not create/find Gitee release, skipping upload."
            exit 0
          fi

          # 上传安装包和更新清单；blockmap 跳过
          for FILE in artifacts/macos/*.dmg artifacts/windows/*.exe artifacts/macos/*.yml artifacts/windows/*.yml; do
            [ -f "$FILE" ] || continue
            NAME=$(basename "$FILE")
            echo "Uploading: $NAME"
            curl -s -X POST "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases/${RELEASE_ID}/attach_files" \
              -F "access_token=${GITEE_TOKEN}" \
              -F "file=@${FILE};filename=${NAME}" \
              --max-time 600 \
            && echo "  ✓ $NAME" \
            || echo "  ✗ $NAME (skipped)"
          done
