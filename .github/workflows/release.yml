name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── 各平台构建 & 发布到 GitHub Releases ──────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest   # Apple Silicon runner → 原生构建 arm64
            artifact: macos-arm64
            eb_flags: --mac --arm64
          - os: macos-13       # Intel runner → 原生构建 x64（避免交叉编译 dmg 问题）
            artifact: macos-x64
            eb_flags: --mac --x64
          - os: windows-latest
            artifact: windows
            eb_flags: --win
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish to GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          npm run build
          npx electron-builder ${{ matrix.eb_flags }} --publish always

      # 暂存产物供后续 Gitee 上传
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*-arm64.dmg
            release/*-x64.dmg
            release/*.exe
            release/*.yml
            release/*.blockmap
          retention-days: 1

  # ── 所有平台构建完成后，同步上传到 Gitee Releases ────────────────────────
  publish-gitee:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: artifacts/macos

      - name: Download macOS x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-x64
          path: artifacts/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows
          path: artifacts/windows

      - name: Create Gitee Release and upload assets
        continue-on-error: true
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          OWNER="tlqgyx"
          REPO="xiangzi-md"

          # 等待 Gitee 镜像同步完成（最多 3 分钟）
          echo "Waiting for Gitee mirror to sync tag ${TAG}..."
          for i in $(seq 1 18); do
            FOUND=$(curl -s "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/tags?access_token=${GITEE_TOKEN}&limit=100" \
              | jq -r --arg t "$TAG" '.[] | select(.name==$t) | .name' 2>/dev/null || true)
            if [ "$FOUND" = "$TAG" ]; then
              echo "Tag synced to Gitee."
              break
            fi
            echo "  Not yet (attempt $i/18)... waiting 10s"
            sleep 10
          done

          # 创建 Gitee Release
          BODY="macOS（Apple Silicon M芯片用 arm64，Intel 芯片用 x64）和 Windows 安装包见下方附件。"
          RESP=$(curl -s -X POST "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases" \
            -H "Content-Type: application/json" \
            -d "{\"access_token\":\"${GITEE_TOKEN}\",\"tag_name\":\"${TAG}\",\"name\":\"${TAG}\",\"target_commitish\":\"main\",\"body\":\"${BODY}\"}")
          echo "Create response: ${RESP:0:300}"
          RELEASE_ID=$(echo "$RESP" | jq -r '.id // empty' 2>/dev/null || true)

          # Release 已存在时直接查询
          if [ -z "$RELEASE_ID" ]; then
            RESP2=$(curl -s "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases/tags/${TAG}?access_token=${GITEE_TOKEN}")
            echo "Query response: ${RESP2:0:300}"
            RELEASE_ID=$(echo "$RESP2" | jq -r '.id // empty' 2>/dev/null || true)
          fi

          echo "Gitee Release ID: $RELEASE_ID"
          if [ -z "$RELEASE_ID" ]; then
            echo "::warning::Could not create/find Gitee release, skipping upload."
            exit 0
          fi

          # 上传 arm64 + x64 DMG、Windows 安装包、更新清单
          for FILE in artifacts/macos/*-arm64.dmg artifacts/macos/*-x64.dmg artifacts/windows/*.exe artifacts/windows/*.yml; do
            [ -f "$FILE" ] || continue
            NAME=$(basename "$FILE")
            echo "Uploading: $NAME"
            curl -s -X POST "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases/${RELEASE_ID}/attach_files" \
              -F "access_token=${GITEE_TOKEN}" \
              -F "file=@${FILE};filename=${NAME}" \
              --max-time 600 \
            && echo "  ✓ $NAME" \
            || echo "  ✗ $NAME (skipped)"
          done
