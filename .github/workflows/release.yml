name: Release Desktop

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - src-tauri/Cargo.toml
      - src-tauri/tauri.conf.json
      - .github/workflows/release.yml
  workflow_dispatch:
    inputs:
      force:
        description: Rebuild and repair an existing version release
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.release.outputs.publish }}
      tag: ${{ steps.release.outputs.tag }}
      notes: ${{ steps.notes.outputs.body }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Publish only once per package version
        id: release
        shell: bash
        run: |
          set -euo pipefail
          TAG="v$(jq -r '.version' package.json)"
          test "${TAG}" != "vnull"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            echo "Repair mode enabled for ${TAG}; existing release assets will be rebuilt."
            echo "publish=true" >> "${GITHUB_OUTPUT}"
          elif git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Version ${TAG} is already released; CI will still validate this commit."
            echo "publish=false" >> "${GITHUB_OUTPUT}"
          else
            echo "publish=true" >> "${GITHUB_OUTPUT}"
          fi
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Build user-facing update notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          PREVIOUS_TAG="$(git tag --merged HEAD --list 'v*' --sort=-v:refname | head -n 1 || true)"
          if [ -n "${PREVIOUS_TAG}" ]; then
            RANGE="${PREVIOUS_TAG}..HEAD"
          else
            RANGE="HEAD~20..HEAD"
          fi

          NOTES_FILE="$(mktemp)"
          while IFS= read -r SUBJECT; do
            case "${SUBJECT}" in
              feat:*|feat\(*\):*|fix:*|fix\(*\):*|perf:*|perf\(*\):*|refactor:*|refactor\(*\):*)
                TITLE="$(printf '%s' "${SUBJECT}" | sed -E 's/^(feat|fix|perf|refactor)(\([^)]*\))?!?:[[:space:]]*//')"
                [ -n "${TITLE}" ] && printf -- '- %s\n' "${TITLE}" >> "${NOTES_FILE}"
                ;;
            esac
          done < <(git log "${RANGE}" --no-merges --pretty=format:'%s')

          if [ ! -s "${NOTES_FILE}" ]; then
            printf '%s\n' '- 常规体验优化与稳定性改进。' > "${NOTES_FILE}"
          fi

          DELIMITER="RELEASE_NOTES_$(date +%s%N)"
          {
            echo "body<<${DELIMITER}"
            echo '## 本次更新'
            cat "${NOTES_FILE}"
            echo "${DELIMITER}"
          } >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.artifact }}
    needs: prepare
    if: needs.prepare.outputs.publish == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact: macos-universal
            args: --target universal-apple-darwin --bundles app,dmg
          - platform: windows-latest
            artifact: windows-x64
            args: --bundles nsis
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust for macOS universal build
        if: runner.os == 'macOS'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Rust
        if: runner.os != 'macOS'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend quality gate
        run: npm run check

      - name: Build and publish GitHub Release assets
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: '-'
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: Xiangzi MD v__VERSION__
          releaseBody: ${{ needs.prepare.outputs.notes }}
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
