name: Release Desktop

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build
        required: true
        type: string
      force:
        description: Rebuild and repair an existing version release
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  # Manual repairs for different tags must not cancel each other merely because
  # workflow_dispatch runs from the same default branch.
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.release.outputs.publish }}
      tag: ${{ steps.release.outputs.tag }}
      notes: ${{ steps.notes.outputs.body }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Publish only once per package version
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          FORCE_RELEASE: ${{ inputs.force }}
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then TAG="${INPUT_TAG}"; fi
          [[ "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]
          test "${TAG}" = "v$(jq -r '.version' package.json)"
          if [ "${EVENT_NAME}" = "workflow_dispatch" ] && [ "${FORCE_RELEASE}" = "true" ]; then
            echo "Repair mode enabled for ${TAG}; existing release assets will be rebuilt."
            echo "publish=true" >> "${GITHUB_OUTPUT}"
          elif curl -sf -o /dev/null \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}"; then
            # 以 GitHub Release 是否存在为准。之前检查的是 tag 是否存在于远端，
            # 而 tag push 触发的 run 里 tag 必然已存在，导致推 tag 永远不发布。
            echo "Version ${TAG} is already released; CI will still validate this commit."
            echo "publish=false" >> "${GITHUB_OUTPUT}"
          else
            echo "publish=true" >> "${GITHUB_OUTPUT}"
          fi
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Verify release identity and version consistency
        env:
          TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(jq -er '.version' package.json)
          TAURI_VERSION=$(jq -er '.version' src-tauri/tauri.conf.json)
          CARGO_VERSION=$(awk '
            /^\[package\]$/ { in_package=1; next }
            /^\[/ { in_package=0 }
            in_package && /^version = / {
              gsub(/^version = "|"$/, ""); print; exit
            }
          ' src-tauri/Cargo.toml)
          LOCK_VERSION=$(awk '
            $0 == "name = \"xiangzi-md\"" { found=1; next }
            found && /^version = / {
              gsub(/^version = "|"$/, ""); print; exit
            }
          ' src-tauri/Cargo.lock)

          printf 'tag=%s package=%s tauri=%s cargo=%s lock=%s\n' \
            "${TAG}" "${PACKAGE_VERSION}" "${TAURI_VERSION}" "${CARGO_VERSION}" "${LOCK_VERSION}"
          test -n "${LOCK_VERSION}"
          test "${TAG}" = "v${PACKAGE_VERSION}"
          test "${PACKAGE_VERSION}" = "${TAURI_VERSION}"
          test "${PACKAGE_VERSION}" = "${CARGO_VERSION}"
          test "${PACKAGE_VERSION}" = "${LOCK_VERSION}"

          git fetch origin +refs/heads/main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor HEAD refs/remotes/origin/main; then
            echo "::error::${TAG} does not point to a commit contained in origin/main."
            exit 1
          fi

      - name: Build user-facing update notes
        id: notes
        env:
          TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          NOTES_FILE="$(mktemp)"

          # 附注 tag 的正文优先：发布者打 tag 时写好的完整更新明细原样作为
          # 发布说明；tag 没有附注正文时才回退到按提交标题自动生成。
          git tag -l --format='%(contents)' "${TAG}" > "${NOTES_FILE}" 2>/dev/null || true

          if ! grep -q '[^[:space:]]' "${NOTES_FILE}"; then
            : > "${NOTES_FILE}"
            echo '## 本次更新' >> "${NOTES_FILE}"
            # sed -n 2p：跳过当前正在发布的 tag 本身，取上一个版本作为区间起点
            PREVIOUS_TAG="$(git tag --merged HEAD --list 'v*' --sort=-v:refname | sed -n '2p' || true)"
            if [ -n "${PREVIOUS_TAG}" ]; then
              RANGE="${PREVIOUS_TAG}..HEAD"
            else
              RANGE="HEAD~20..HEAD"
            fi

            while IFS= read -r SUBJECT; do
              case "${SUBJECT}" in
                feat:*|feat\(*\):*|fix:*|fix\(*\):*|perf:*|perf\(*\):*|refactor:*|refactor\(*\):*)
                  TITLE="$(printf '%s' "${SUBJECT}" | sed -E 's/^(feat|fix|perf|refactor)(\([^)]*\))?!?:[[:space:]]*//')"
                  [ -n "${TITLE}" ] && printf -- '- %s\n' "${TITLE}" >> "${NOTES_FILE}"
                  ;;
              esac
            done < <(git log "${RANGE}" --no-merges --pretty=format:'%s')

            if [ "$(grep -c '^- ' "${NOTES_FILE}")" -eq 0 ]; then
              printf '%s\n' '- 常规体验优化与稳定性改进。' >> "${NOTES_FILE}"
            fi
          fi

          DELIMITER="RELEASE_NOTES_$(date +%s%N)"
          {
            echo "body<<${DELIMITER}"
            cat "${NOTES_FILE}"
            echo "${DELIMITER}"
          } >> "${GITHUB_OUTPUT}"

  quality:
    name: Release gate ${{ matrix.os }}
    needs: prepare
    if: needs.prepare.outputs.publish == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm run check
      - run: npm run rust:check

  build:
    name: Build ${{ matrix.artifact }}
    needs: [prepare, quality]
    if: needs.prepare.outputs.publish == 'true'
    strategy:
      fail-fast: false
      # tauri-action 会读写同一个 Release 和 latest.json；串行发布可避免两个
      # 平台同时覆盖更新清单，尤其是在修复已有版本时。
      max-parallel: 1
      matrix:
        include:
          # 钉在 macos-14：macos-latest 已开始轮换到 macOS 26 beta 镜像，
          # C 依赖（ring 等）在新 Xcode 下交叉编 universal 会构建失败。
          - platform: macos-14
            artifact: macos-universal
            args: --target universal-apple-darwin --bundles app,dmg
          - platform: windows-latest
            artifact: windows-x64
            args: --bundles nsis
    runs-on: ${{ matrix.platform }}
    environment: production-release
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install Rust for macOS universal build
        if: runner.os == 'macOS'
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Rust
        if: runner.os != 'macOS'
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30

      - name: Cache Rust build
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify signing secrets
        id: signing
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
        run: |
          set -euo pipefail
          # 更新器签名密钥是硬性要求：缺了它 latest.json 无法生成，自动更新会断。
          test -n "${TAURI_SIGNING_PRIVATE_KEY}"
          # 平台代码签名证书是可选项：全部配齐才启用签名，全空则构建未签名安装包
          #（与 v1.2.1 之前的发布行为一致）；只配了一部分视为配置错误，直接失败。
          count_set() { local n=0; for v in "$@"; do [ -n "${v}" ] && n=$((n+1)); done; echo "${n}"; }
          if [ "${RUNNER_OS}" = "macOS" ]; then
            SET=$(count_set "${APPLE_CERTIFICATE}" "${APPLE_CERTIFICATE_PASSWORD}" "${APPLE_SIGNING_IDENTITY}" "${APPLE_ID}" "${APPLE_PASSWORD}" "${APPLE_TEAM_ID}")
            if [ "${SET}" = "6" ]; then
              echo "apple=true" >> "${GITHUB_OUTPUT}"
            elif [ "${SET}" = "0" ]; then
              echo "::warning::未配置 Apple 签名证书，本次构建未签名 macOS 安装包。"
              echo "apple=false" >> "${GITHUB_OUTPUT}"
            else
              echo "::error::Apple 签名 secrets 只配置了 ${SET}/6 项，请配齐或全部留空。"
              exit 1
            fi
          else
            SET=$(count_set "${WINDOWS_CERTIFICATE}" "${WINDOWS_CERTIFICATE_PASSWORD}" "${WINDOWS_CERTIFICATE_THUMBPRINT}")
            if [ "${SET}" = "3" ]; then
              echo "windows=true" >> "${GITHUB_OUTPUT}"
            elif [ "${SET}" = "0" ]; then
              echo "::warning::未配置 Windows 签名证书，本次构建未签名安装包。"
              echo "windows=false" >> "${GITHUB_OUTPUT}"
            else
              echo "::error::Windows 签名 secrets 只配置了 ${SET}/3 项，请配齐或全部留空。"
              exit 1
            fi
          fi

      - name: Import macOS Developer ID certificate
        if: runner.os == 'macOS' && steps.signing.outputs.apple == 'true'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="${RUNNER_TEMP}/developer-id.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/xiangzi-signing.keychain-db"
          printf '%s' "${APPLE_CERTIFICATE}" | base64 --decode > "${CERTIFICATE_PATH}"
          security create-keychain -p "${RUNNER_TEMP}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${RUNNER_TEMP}" "${KEYCHAIN_PATH}"
          security import "${CERTIFICATE_PATH}" -P "${APPLE_CERTIFICATE_PASSWORD}" -A -t cert -f pkcs12 -k "${KEYCHAIN_PATH}"
          security set-key-partition-list -S apple-tool:,apple: -k "${RUNNER_TEMP}" "${KEYCHAIN_PATH}"
          security list-keychain -d user -s "${KEYCHAIN_PATH}" login.keychain-db

      - name: Import Windows Authenticode certificate
        if: runner.os == 'Windows' && steps.signing.outputs.windows == 'true'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
        run: |
          $bytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $path = Join-Path $env:RUNNER_TEMP 'xiangzi-signing.pfx'
          [IO.File]::WriteAllBytes($path, $bytes)
          $password = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          Import-PfxCertificate -FilePath $path -CertStoreLocation Cert:\CurrentUser\My -Password $password | Out-Null
          $config = @{ bundle = @{ windows = @{ certificateThumbprint = $env:WINDOWS_CERTIFICATE_THUMBPRINT; digestAlgorithm = 'sha256'; timestampUrl = 'http://timestamp.digicert.com' } } } | ConvertTo-Json -Compress -Depth 4
          "TAURI_CONFIG=$config" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build and publish signed macOS Release assets
        if: runner.os == 'macOS' && steps.signing.outputs.apple == 'true'
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: Xiangzi MD v__VERSION__
          releaseBody: ${{ needs.prepare.outputs.notes }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

      - name: Build and publish Release assets without Apple identity
        if: runner.os != 'macOS' || steps.signing.outputs.apple == 'false'
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 不配置 Apple 证书时不能把空的 APPLE_SIGNING_IDENTITY 传给 Tauri，
          # 否则 macOS Runner 会尝试用空身份 codesign 并在 keychain 阶段失败。
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: Xiangzi MD v__VERSION__
          releaseBody: ${{ needs.prepare.outputs.notes }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

      - name: Generate platform SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: sbom-${{ matrix.artifact }}.spdx.json
          upload-artifact: false

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          set -euo pipefail
          # macOS 自带 shasum（Perl），Windows git-bash 只有 coreutils 的 sha256sum
          if command -v sha256sum >/dev/null 2>&1; then
            HASH_CMD=(sha256sum)
          else
            HASH_CMD=(shasum -a 256)
          fi
          find src-tauri/target -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.tar.gz' -o -name '*.sig' \) -print0 \
            | sort -z | xargs -0 "${HASH_CMD[@]}" > SHA256SUMS-${{ matrix.artifact }}.txt
          test -s SHA256SUMS-${{ matrix.artifact }}.txt

      - name: Attest installers, updater signatures, checksums and SBOM
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: |
            src-tauri/target/**/bundle/**/*.dmg
            src-tauri/target/**/bundle/**/*.exe
            src-tauri/target/**/bundle/**/*.tar.gz
            src-tauri/target/**/bundle/**/*.sig
            SHA256SUMS-${{ matrix.artifact }}.txt
            sbom-${{ matrix.artifact }}.spdx.json

      - name: Upload verification metadata to the release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          gh release upload "${TAG}" \
            "SHA256SUMS-${{ matrix.artifact }}.txt" \
            "sbom-${{ matrix.artifact }}.spdx.json" \
            --clobber
