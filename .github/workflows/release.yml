name: Release Desktop

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - src-tauri/Cargo.toml
      - src-tauri/tauri.conf.json
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.release.outputs.publish }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish only once per package version
        id: release
        shell: bash
        run: |
          set -euo pipefail
          TAG="v$(jq -r '.version' package.json)"
          test "${TAG}" != "vnull"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Version ${TAG} is already released; CI will still validate this commit."
            echo "publish=false" >> "${GITHUB_OUTPUT}"
          else
            echo "publish=true" >> "${GITHUB_OUTPUT}"
          fi
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.artifact }}
    needs: prepare
    if: needs.prepare.outputs.publish == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact: macos-universal
            args: --target universal-apple-darwin --bundles dmg
          - platform: windows-latest
            artifact: windows-x64
            args: --bundles nsis
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Rust for macOS universal build
        if: runner.os == 'macOS'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Rust
        if: runner.os != 'macOS'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend quality gate
        run: npm run check

      - name: Build and publish GitHub Release assets
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: '-'
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: Xiangzi MD v__VERSION__
          releaseBody: |
            Xiangzi MD Tauri 桌面版本。

            - macOS：Universal DMG，同时支持 Apple Silicon 与 Intel。
            - Windows：x64 NSIS 安装包。
            - 应用内更新：签名校验，GitHub 不可用时自动切换 Gitee。
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
