name: Release Desktop

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact: macos-universal
            args: --target universal-apple-darwin --bundles dmg
          - platform: windows-latest
            artifact: windows-x64
            args: --bundles nsis
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust for macOS universal build
        if: runner.os == 'macOS'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Rust
        if: runner.os != 'macOS'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend quality gate
        run: npm run check

      - name: Build and publish GitHub Release assets
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: '-'
        with:
          tagName: v__VERSION__
          releaseName: Xiangzi MD v__VERSION__
          releaseBody: |
            Xiangzi MD 1.0 Tauri 版本。

            - macOS：Universal DMG，同时支持 Apple Silicon 与 Intel。
            - Windows：x64 NSIS 安装包。
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Upload macOS artifact for Gitee
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-universal
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 3

      - name: Upload Windows artifact for Gitee
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x64
          path: src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error
          retention-days: 3
